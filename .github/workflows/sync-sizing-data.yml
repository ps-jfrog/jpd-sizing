name: Sync JFrog Sizing Data

on:
  schedule:
    # Every Monday at 07:00 UTC — gives JFrog time to publish overnight doc updates.
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (detect changes but do not open a PR)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install scraper dependencies
        run: npm install
        working-directory: scripts

      - name: Run scraper
        id: scrape
        run: |
          set +e
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scrape-sizing.js --dry-run
          else
            node scrape-sizing.js
          fi
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        working-directory: scripts

      - name: Fail on parse error
        if: steps.scrape.outputs.exit_code == '2'
        run: |
          echo "Scraper exited with code 2 (parse/validation error). Check the logs above."
          exit 1

      - name: Open PR if data changed
        if: steps.scrape.outputs.exit_code == '1' && inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/sync-sizing-data
          delete-branch: true
          commit-message: 'chore: sync sizing-data.json from JFrog docs'
          title: 'chore: update JFrog sizing data'
          body: |
            ## JFrog sizing data update

            The weekly scraper detected changes in the JFrog reference architecture docs.
            This PR updates `sizing-data.json` to reflect the latest published sizing.

            **Review checklist**
            - [ ] Diff looks like a genuine JFrog change, not a parse error
            - [ ] Instance types / replica counts / storage values are plausible
            - [ ] No fields were zeroed out (would indicate a scraper regression)

            Once merged, the calculator will serve the updated numbers on next page load.

            ---
            *Generated by `.github/workflows/sync-sizing-data.yml`*
          labels: 'sizing-data,automated'

      - name: No changes
        if: steps.scrape.outputs.exit_code == '0'
        run: echo "sizing-data.json is already up to date — no PR needed."
